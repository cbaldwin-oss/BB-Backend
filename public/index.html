function refreshDropdowns() {
    console.log("🔄 Syncing dropdown options...");
    const selects = document.querySelectorAll('select');
    
    selects.forEach(select => {
        const parts = select.id.split('-c');
        if (parts.length < 2) return;
        
        const cellId = select.id;
        const colNum = parseInt(parts[1]);
        const colKey = `col${colNum}`;
        const options = window.dropdownData[colKey] || [];
        
        const savedValue = select.value;
        const savedMultiText = select.getAttribute('data-selected');

        select.innerHTML = '';

        if (colNum === 6) {
            // --- THE FIX: Handle Column 6 text inside the select ---
            const def = document.createElement('option');
            def.value = ""; 
            // Set the placeholder text directly to the first option
            def.text = (savedMultiText && savedMultiText !== "") ? `Selected: ${savedMultiText}` : "+ Add Multi";
            select.appendChild(def);
        } else {
            const def = document.createElement('option');
            def.value = ""; def.text = "Select...";
            select.appendChild(def);
        }

        options.forEach(text => {
            const opt = document.createElement('option');
            opt.value = text; opt.text = text;
            select.appendChild(opt);
        });

        select.value = savedValue;
        
        // Final coloring pass to ensure the single cell looks correct
        const colorVal = (colNum === 6) ? savedMultiText : select.value;
        applyCellColor(select, colorVal);
    });

function applyCellColor(element, value) {
    if (!element) return;

    // 1. DATA CAPTURE
    let capturedValue = value;
    if (capturedValue === undefined || capturedValue === null) {
        capturedValue = element.getAttribute('data-selected') || element.value || "";
    }

            element.style.color = "#0056b3";
            element.style.fontWeight = "bold";

                    // Calculate how many rows of text we need
                    const estimatedLines = Math.ceil(charCount / 28); 
                    const newHeight = (estimatedLines * 20) + 10; // 20px per line + padding
                    element.style.height = newHeight + "px";
                } else {
                    element.style.height = "40px"; // Default height
                }
            }
        } else {
            element.style.backgroundColor = "transparent";
            element.style.height = "40px"; // Reset
            if (element.options && element.options[0]) {

            }
        }
        return;

let val = value || element.getAttribute('data-selected') || element.value || "";

        element.style.color = "#856404";
        element.style.fontWeight = "bold";
    } 
    else if (lowerVal.includes("low") || lowerVal.includes("fail") || lowerVal.includes("urgent")) {

// Helper to create stable, short integers for Supabase int4
function generateNumericId(dayLabel, index) {
    const dayMap = { 
        "Monday": 1, "Tuesday": 2, "Wednesday": 3, "Thursday": 4, 
        "Friday": 5, "Saturday": 6, "Sunday": 7 
    };
    // Format: DayDigit + RowIndex (e.g., Monday Row 5 = 105)
    return (dayMap[dayLabel] || 0) * 100 + index;
}

function addRowsToContainer(container, dayLabel, anchorBtn = null) {
    const MAX_ROWS = 20; 
    
    for (let r = 0; r < MAX_ROWS; r++) {
        const rowNumericId = generateNumericId(dayLabel, r);
        const rowDiv = document.createElement('div');
        rowDiv.className = 'cell-row';
        rowDiv.id = `row-wrapper-${rowNumericId}`;
        rowDiv.setAttribute('data-date', dayLabel);

        if (r > 2) rowDiv.style.display = 'none';
        else rowDiv.style.display = 'flex';

        for (let col = 1; col <= 8; col++) {
            const cellId = `${dayLabel}-r${rowNumericId}-c${col}`;
            let element;

            if (col === 6) {
                // --- THE FIX: Standardize Column 6 to a single select ---
                element = document.createElement('select');
                element.id = cellId;
                
                const defaultOpt = document.createElement('option');
                defaultOpt.value = "";
                defaultOpt.text = "+ Add Multi"; // Placeholder text inside the select
                element.appendChild(defaultOpt);

                const options = (window.dropdownData && window.dropdownData[`col${col}`]) ? window.dropdownData[`col${col}`] : [];
                options.forEach(text => {
                    const opt = document.createElement('option');
                    opt.value = text; opt.text = text;
                    element.appendChild(opt);
                });

                element.onchange = () => updateMultiValue(rowNumericId, dayLabel, element.value);
                rowDiv.appendChild(element); // Append directly to rowDiv
            } else if ([1, 2, 3, 4, 7].includes(col)) {
                element = document.createElement('select');
                element.id = cellId;
                const def = document.createElement('option');
                def.value = ""; def.text = "Select...";
                element.appendChild(def);

                const opts = (window.dropdownData && window.dropdownData[`col${col}`]) ? window.dropdownData[`col${col}`] : [];
                opts.forEach(t => {
                    const o = document.createElement('option');
                    o.value = t; o.text = t;
                    element.appendChild(o);
                });
                element.onchange = () => { applyCellColor(element, element.value); saveRow(rowNumericId, dayLabel); };
                rowDiv.appendChild(element);
            } else {
                element = document.createElement('input');
                element.id = cellId;
                element.placeholder = "...";
                element.onblur = () => { applyCellColor(element, element.value); saveRow(rowNumericId, dayLabel); };
                rowDiv.appendChild(element);
            }
        }
        
        const delBtn = document.createElement('button');
        delBtn.className = 'delete-btn';
        delBtn.innerHTML = '×'; 
        delBtn.onclick = () => deleteFullRow(rowDiv.id, []);
        rowDiv.appendChild(delBtn);
        container.appendChild(rowDiv);
    }
    if (anchorBtn) container.appendChild(anchorBtn);
}

let allWeeksCollapsed = false; // Track the global state

function toggleAllSections() {
    const weekContents = document.querySelectorAll('.week-content');
    const weekArrows = document.querySelectorAll('.week-arrow');
    const btn = document.getElementById('collapse-all-btn');

            // Force collapse
            content.classList.add('hidden');
            if (weekArrows[index]) weekArrows[index].innerText = '▶';
        } else {
            // Force expand
            content.classList.remove('hidden');
            if (weekArrows[index]) weekArrows[index].innerText = '▼';
        }
    });

    // Update the button text to show the next action

async function updateMultiValue(rowNum, dayLabel, newValue) {
    // 1. Ignore if user clicks the placeholder or if it's an empty reset
    if (!newValue || newValue === "") return; 

    const element = document.getElementById(`${dayLabel}-r${rowNum}-c6`);
    let currentContent = element.getAttribute('data-selected') || "";
    let items = currentContent ? currentContent.split(', ').filter(x => x) : [];

    // Toggle logic
    const index = items.indexOf(newValue);
    if (index === -1) items.push(newValue);
    else items.splice(index, 1);

    const updatedString = items.join(', ');

    // 2. Lock the data into the attribute
    element.setAttribute('data-selected', updatedString);
    
    // 3. Update the UI Text
    if (items.length > 0) {
        element.options[0].text = `Selected (${items.length}): ${updatedString}`;
        element.style.backgroundColor = "#e7f3ff";
    } else {
        element.options[0].text = "+ Add Multi";
        element.style.backgroundColor = "";
    }

    // 4. Force the cloud save with the string directly (bypass the element's current value)
    await saveRow(rowNum, dayLabel, updatedString);

    // 5. Reset visual selection ONLY AFTER the save process has the data
    element.value = ""; 
}

async function deleteFullRow(wrapperId, cellIds) {
    if (confirm("Delete this entire line?")) {
        // 1. Identify the Row ID from the first cell ID (e.g., "2026-04-20-r101-c1")
        const parts = cellIds[0].split('-r');
        const rowNumericId = parseInt(parts[1].split('-c')[0]);

        // 2. Remove from the Screen immediately for instant feedback
        const element = document.getElementById(wrapperId);
        if (element) element.remove();

        // 3. Remove from Supabase using the correct table name 'BackEndData'
        const { error } = await _supabase
            .from('BackEndData')
            .delete()
            .eq('id', rowNumericId);

        if (error) {
            console.error("Delete error:", error.message);
            alert("Cloud Delete Failed: " + error.message);
        } else {
            console.log(`✅ Row ${rowNumericId} deleted from Cloud.`);
            
            // Optional: Update save indicator to show success
            const status = document.getElementById('saveIndicator');
            if (status) {
                status.innerText = "Row Deleted";
                setTimeout(() => { status.innerText = ""; }, 2000);
            }
        }
    }
}

async function saveRow(rowNum, dayLabel, col6Override = null) {
    const syncKey = `${dayLabel}-${rowNum}`;
    if (activeSyncs.has(syncKey)) return;
    activeSyncs.add(syncKey);

    const status = document.getElementById('saveIndicator');

    // --- THE FIX: Capture data from all 8 columns into the rowData object ---
    const rowData = {
        id: rowNum,
        day_label: dayLabel,
        col1: document.getElementById(`${dayLabel}-r${rowNum}-c1`)?.value || "",
        col2: document.getElementById(`${dayLabel}-r${rowNum}-c2`)?.value || "",
        col3: document.getElementById(`${dayLabel}-r${rowNum}-c3`)?.value || "",
        col4: document.getElementById(`${dayLabel}-r${rowNum}-c4`)?.value || "",
        col5: document.getElementById(`${dayLabel}-r${rowNum}-c5`)?.value || "",
        // Col 6 priority: uses override (if from updateMultiValue) or the stored data-selected attribute
        col6: col6Override !== null ? col6Override : (document.getElementById(`${dayLabel}-r${rowNum}-c6`)?.getAttribute('data-selected') || ""),
        col7: document.getElementById(`${dayLabel}-r${rowNum}-c7`)?.value || "",
        col8: document.getElementById(`${dayLabel}-r${rowNum}-c8`)?.value || ""
    };

    try {
        const { error } = await _supabase
            .from('BackEndData')
            .upsert(rowData, { onConflict: 'id' });

        if (error) throw error;

        // Refresh colors for all cells in this row after a successful save
        for (let col = 1; col <= 8; col++) {
            const cell = document.getElementById(`${dayLabel}-r${rowNum}-c${col}`);
            if (cell) {
                const valToPass = (col === 6) ? cell.getAttribute('data-selected') : cell.value;
                applyCellColor(cell, valToPass);
            }
        }

        // Update the timestamp on the screen
        if (status) status.innerText = `Last saved at: ${getTimestamp()}`;
        
    } catch (err) {
        console.error("🔴 Sync Failure:", err.message);
        if (status) status.innerText = "Sync Error!";
    } finally {
        activeSyncs.delete(syncKey);
    }
}

let currentView = 'view1'; // Default view

function applyViewFilter(viewId) {
    const sections = document.querySelectorAll('.section-container');
    const weekContainers = document.querySelectorAll('.week-container');

    // 1. Reset everything to visible first
    sections.forEach(s => s.style.display = 'block');
    weekContainers.forEach(w => w.style.display = 'block');

    // 2. Define the date range logic
    const today = new Date();
    today.setHours(0, 0, 0, 0);

    let targetDate = null;

    if (viewId === 'view2') {
        // 3 Day Look Ahead (Today + 2)
        targetDate = new Date(today);
        targetDate.setDate(today.getDate() + 2);
    } else if (viewId === 'view3') {
        // 1 Week Look Ahead (Today + 6)
        targetDate = new Date(today);
        targetDate.setDate(today.getDate() + 6);
    }

    // 3. Apply the filter if a Look Ahead view is selected
    if (targetDate) {
        sections.forEach(section => {
            const rowsDiv = section.querySelector('.rows-container');
            if (!rowsDiv) return;
            
            // Extract YYYY-MM-DD from ID: rows-2026-04-20
            const dateStr = rowsDiv.id.replace('rows-', '');
            const [y, m, d] = dateStr.split('-').map(Number);
            const sectionDate = new Date(y, m - 1, d);
            sectionDate.setHours(0, 0, 0, 0);

            // Hide if date is in the past OR beyond our target window
            if (sectionDate < today || sectionDate > targetDate) {
                section.style.display = 'none';
            }
        });

        // 4. Clean up the Week Accordions
        weekContainers.forEach(week => {
            const visibleDays = Array.from(week.querySelectorAll('.section-container'))
                                     .filter(s => s.style.display !== 'none');
            
            if (visibleDays.length === 0) {
                week.style.display = 'none';
            } else {
                // Auto-expand the week so the user sees the filtered days immediately
                const content = week.querySelector('.week-content');
                const arrow = week.querySelector('.week-arrow');
                if (content) content.classList.remove('hidden');
                if (arrow) arrow.innerText = '▼';
            }
        });
    } else {
        // OVERALL SCHEDULE: ViewId 'view1' or default
        // Standard behavior: make sure everything is expanded or follows default state
        expandAllWeeks(); 
    }
}

async function switchView(viewId, buttonElement) {
    currentView = viewId;
    
    // 1. Update Button Styles
    document.querySelectorAll('.view-btn').forEach(btn => btn.classList.remove('active'));
    buttonElement.classList.add('active');

    // 2. Apply Visibility Filter
    applyViewFilter(viewId);

    // 3. Optional: Sync data to ensure current view is fresh
    await loadData();
}

function autoCleanUI() {
    const now = new Date();
    const todayStr = [
        now.getFullYear(),
        String(now.getMonth() + 1).padStart(2, '0'),
        String(now.getDate()).padStart(2, '0')
    ].join('-');

    console.log("🧹 Protected Cleanup starting...");

    const allRows = document.querySelectorAll('[data-date]');

    allRows.forEach(row => {
        const rowDate = row.getAttribute('data-date');
        
        // 1. Is the row from a past date?
        if (rowDate < todayStr) {
            
            // 2. Is this row "Occupied" by Supabase data?
            const isOccupied = row.getAttribute('data-occupied') === 'true';

            if (!isOccupied) {
                // 3. Secondary check: Are the columns actually still empty?
                const col3 = row.querySelector(`[id$="-c3"]`);
                const col4 = row.querySelector(`[id$="-c4"]`);
                
                const val3 = col3?.value?.toLowerCase() || "";
                const val4 = col4?.value?.toLowerCase() || "";
                
                const isTrulyEmpty = (val3 === "" || val3.includes("select")) && 
                                     (val4 === "" || val4.includes("select"));

                if (isTrulyEmpty) {
                    row.style.display = 'none';
                }
            } else {
                // Row has data! Ensure it is visible.
                row.style.display = 'flex';
            }
        } else {
            // Today or Future: Always visible.
            row.style.display = 'flex';
        }
    });
}

// UPDATE YOUR LOAD LOGIC
// Helper to get simple AM/PM time
function getTimestamp() {
    return new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', second: '2-digit' });
}

async function loadData() {
    const status = document.getElementById('saveIndicator');
    // REMOVED: status.innerText = "Syncing..."; <--- This stops the flashing

    try {
        const { data, error } = await _supabase.from('BackEndData').select('*');
        if (error) throw error;

        if (data) {
            data.forEach(row => {
                const wrapper = document.getElementById(`row-wrapper-${row.id}`);
                if (wrapper) {
                    wrapper.style.display = 'flex';
                    wrapper.setAttribute('data-occupied', 'true');
                }

                for (let col = 1; col <= 8; col++) {
                    const cellId = `${row.day_label}-r${row.id}-c${col}`;
                    const el = document.getElementById(cellId);
                    if (el) {
                        const content = row[`col${col}`] || "";
                        if (col === 6) {
                            el.setAttribute('data-selected', content);
                            applyCellColor(el, content);
                        } else {
                            el.value = content;
                            applyCellColor(el, content);
                        }
                    }
                }
            });
            
            // Update the time silently once the fetch is done
            if (status) status.innerText = `Last saved at: ${getTimestamp()}`;
            return true; 
        }
    } catch (err) {
        console.error("🔴 Load Error:", err.message);
        // We only show an error if it actually fails
        if (status) status.innerText = "Sync Error!";
        return false;
    }
}

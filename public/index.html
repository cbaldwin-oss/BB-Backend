<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Cloud Spreadsheet</title>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; width: 100%; overflow: auto; }
        table { border-collapse: collapse; width: 100%; table-layout: fixed; background: white; }
        td { border: 1px solid #e0e0e0; height: 35px; padding: 0; }
        input { 
            width: 100%; height: 100%; border: none; outline: none; 
            padding: 0 8px; font-size: 14px; box-sizing: border-box; 
        }
        input:focus { outline: 2px solid #1a73e8; z-index: 10; position: relative; }
    </style>
</head>
<body>
    <div class="header">
        <div class="logo">CloudSheets</div>
        <div class="controls">
            <button onclick="window.location.reload()">Refresh</button>
            <button id="saveIndicator">Saved</button>
        </div>
    </div>

    <table id="grid"></table>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <script>
        // --- CONFIGURE THESE ---
        const SUPABASE_URL = 'https://rcnxetcomdrlxvlarqoc.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJjbnhldGNvbWRybHh2bGFycW9jIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY0NDIyMjksImV4cCI6MjA5MjAxODIyOX0.gP37sT5OrCOVRZXekMrBZHm5mtfnr6JrC2YGflWsDQU';

        // 1. Initialize Supabase
        const { createClient } = supabase;
        const _supabase = createClient(SUPABASE_URL, SUPABASE_KEY);

        const grid = document.getElementById('grid');
        const totalRows = 40; 
        const totalCols = 15;

// 2. Generate the Grid automatically
for (let r = 0; r < totalRows; r++) {
    let tr = document.createElement('tr');
    for (let c = 0; c < totalCols; c++) {
        let td = document.createElement('td');
        let input = document.createElement('input');
        
        // Generate a unique NUMBER for the ID (e.g., Row 2, Col 5 = 205)
        // This ensures the ID is always an integer for your int4 column
        let numericId = (r * 100) + c; 
        
        input.id = numericId; 
        
        input.onblur = async () => {
            console.log("Saving numeric ID:", numericId);
            const { error } = await _supabase
                .from('cells')
                .upsert({ 
                    id: numericId,        // This is now a Number, not a String
                    content: input.value 
                }, { onConflict: 'id' });
            
            if (error) console.error("Database Error:", error.message);
        };

        td.appendChild(input);
        tr.appendChild(td);
    }
    grid.appendChild(tr);
}

        // 3. Load Data from Supabase
async function loadData() {
    const { data, error } = await _supabase.from('cells').select('*');
    if (error) {
        console.error("Load Error:", error.message);
        return;
    }
    if (data) {
        data.forEach(row => {
            // Use [id='...'] to find elements with numeric IDs reliably
            const cell = document.querySelector(`input[id='${row.id}']`);
            if (cell) {
                cell.value = row.content;
            }
        });
    }
}

        loadData();
    </script>
</body>
</html>

position: sticky;

async function handleRequestAccess() {

    try {
        const url = `${GOOGLE_SCRIPT_URL}?action=requestAccess&email=${encodeURIComponent(email)}&admin=${encodeURIComponent(ADMIN_EMAIL)}`;
        
        const response = await fetch(url);
        const data = await response.json();

        // THE FIX: If it fails, show the error message sent by the Google Script
        if (data.success) {
            successEl.innerText = "Request sent! The admin will be notified.";
        } else {
            const serverError = data.error || "Unknown server error";
            throw new Error(`Google Script Error: ${serverError}`);
        }
    } catch (e) {
        console.error("Request Error:", e);
        errorEl.innerText = e.message; // Now displays the specific Google error
        errorEl.style.display = 'block';
        successEl.style.display = 'none';
    }
}

function initRealtimeSync() {
    console.log("📡 Realtime Sync Active");

    const channel = _supabase
        .channel('table-db-changes')
        .on(
            'postgres_changes',
            {
                event: '*', // Listen for INSERT, UPDATE, and DELETE
                schema: 'public',
                table: 'BackEndData'
            },
            (payload) => {
                const { eventType, new: newRow, old: oldRow } = payload;

                if (eventType === 'UPDATE' || eventType === 'INSERT') {
                    handleIncomingChange(newRow);
                } else if (eventType === 'DELETE') {
                    const wrapper = document.getElementById(`row-wrapper-${oldRow.id}`);
                    if (wrapper) wrapper.style.display = 'none';
                }
            }
        )
        .subscribe();
}

async function verifyPermission(email) {
    try {
        const { data, error } = await _supabase
            .from('authorized_editors')

function refreshDropdowns() {
    document.querySelectorAll('select').forEach(select => {
        const cellId = select.id;
        const parts = cellId.split('-c');
        if (parts.length < 2) return;
        const colNum = parseInt(parts[1]);
        const options = window.dropdownData[`col${colNum}`] || [];
        
        // --- THE FIX: Save the current value before wiping ---
        const currentValue = select.value;
        const savedMultiText = select.getAttribute('data-selected') || "";

        select.innerHTML = "";
        
        const labelOpt = document.createElement('option');
        labelOpt.value = "";
        labelOpt.text = (colNum === 6) ? (savedMultiText ? `Selected: ${savedMultiText}` : "+ Add Multi") : "Select...";
        select.appendChild(labelOpt);

        // Add standard options from the database
        options.forEach(text => {
            const opt = new Option(text, text);
            select.appendChild(opt);
        });

        // --- THE FIX: If the old value isn't in the new list, put it back ---
        if (currentValue && ![...select.options].some(o => o.value === currentValue)) {
            select.add(new Option(currentValue, currentValue));
        }
        
        // Restore the selection
        if (colNum !== 6) select.value = currentValue;

        applyCellColor(select, (colNum === 6 ? savedMultiText : select.value));
    });

    document.querySelectorAll('textarea').forEach(tx => {
        tx.style.height = 'auto';
        tx.style.height = tx.scrollHeight + 'px';
        applyCellColor(tx, tx.value);
    });
}

function applyCellColor(element, value) {
    if (!element) return;
    
    let val = value || element.getAttribute('data-selected') || element.value || "";
    const cleanVal = val.toString().trim();
    const lowerVal = cleanVal.toLowerCase();

    // --- THE FIX: Update Column 6 Display Label ---
    if (element.id && element.id.endsWith("-c6") && element.tagName === "SELECT") {
        if (element.options && element.options[0]) {
            // Set the first option text to the selected values
            element.options[0].text = cleanVal ? `Selected: ${cleanVal}` : "+ Add Multi";
            // Ensure the dropdown stays on this 'label' option
            element.selectedIndex = 0;
        }
    }

    // --- Expansion Logic (Existing) ---
    const charCount = cleanVal.length;
    const isWrappingCol = element.id && (
        element.id.includes("-c5") || element.id.includes("-c6") || 
        element.id.includes("-c7") || element.id.includes("-c8")
    );

    if (isWrappingCol && charCount > 25) {
        const estimatedLines = Math.ceil(charCount / 22); 
        element.style.height = (estimatedLines * 18) + 12 + "px";
    } else {
        element.style.height = "40px";
    }

    // --- Color Logic (Existing) ---
    if (cleanVal === "" || lowerVal === "select..." || lowerVal === "...") {
        element.style.backgroundColor = "#f9f9f9";
        element.style.color = "#666";
        return;
    }

    element.style.backgroundColor = "#e1f5fe";
    element.style.color = "#01579b";

    if (lowerVal.includes("high") || lowerVal.includes("pass") || lowerVal.includes(" 4")) {
        element.style.backgroundColor = "#c8e6c9"; element.style.color = "#1b5e20";
    } else if (lowerVal.includes("med") || lowerVal.includes("hold") || lowerVal.includes(" 2")) {
        element.style.backgroundColor = "#fff9c4"; element.style.color = "#f57f17";
    } else if (lowerVal.includes("open") || lowerVal.includes("fail") || lowerVal.includes("incomplete")) {
        element.style.backgroundColor = "#ffcdd2"; element.style.color = "#b71c1c";
    }
}

// Helper to create stable, short integers for Supabase int4
// Creates a unique ID: YYYYMMDD + RowIndex (e.g., 2026-04-20 Row 5 becomes 2026042005)
function generateNumericId(dateStr, index) {
    // Ensure dateStr is actually a string (e.g., "2026-04-20")
    if (!dateStr || typeof dateStr !== 'string') return index; 
    
    const numericDate = dateStr.replace(/-/g, ''); 
    return (parseInt(numericDate) * 100) + index;
}

async function handleAuthAction() {
    const emailInput = document.getElementById('user-email-input');
    const email = emailInput.value.trim().toLowerCase();
    const pin = document.getElementById('user-pin-input').value.trim();
    const errorEl = document.getElementById('auth-error');
    const successEl = document.getElementById('auth-success');
    const btn = document.getElementById('auth-btn');

    // --- THE FIX: Only require email if we are NOT updating the PIN ---
    if (!window.isUpdateMode && !email) return; 
    if (!pin) return;

    if (pin.length < 6) {
        errorEl.innerText = "Error: PIN must be at least 6 digits.";
        errorEl.style.display = 'block';
        return;
    }

    btn.disabled = true;
    errorEl.style.display = 'none';
    successEl.style.display = 'none';

    try {
        // --- 1. HANDLE PIN UPDATE (Recovery Mode) ---
        if (window.isUpdateMode) {
            const { error } = await _supabase.auth.updateUser({ password: pin });
            if (error) throw error;
            
            // Get the user object to save their email to localStorage
            const { data: { user } } = await _supabase.auth.getUser();
            if (user) {
                localStorage.setItem('launchpad_email', user.email);
            }

            successEl.innerText = "PIN updated! Accessing LaunchPad...";
            successEl.style.display = 'block';
            errorEl.style.display = 'none';

            // Redirect to a clean URL (removes #type=recovery)
            setTimeout(() => {
                window.location.href = window.location.origin + window.location.pathname;
            }, 2000);
            return;
        }

        // --- 2. STANDARD LOGIN/SIGNUP LOGIC ---
        const isApproved = await verifyPermission(email);
        if (!isApproved) {
            errorEl.innerText = "Access Denied: This email is not authorized.";
            errorEl.style.display = 'block';
            btn.disabled = false;
            return;
        }

        if (isSignUpMode) {
            const { error } = await _supabase.auth.signUp({ 
    email: email, 
    password: pin,
    options: {
        // This dynamically sends them back to the exact current page folder
        emailRedirectTo: window.location.origin + window.location.pathname 
    }
});
            if (error) throw error;
            successEl.innerText = "Success! Check your email to verify your account.";
            successEl.style.display = 'block';
        } else {
            const { error } = await _supabase.auth.signInWithPassword({ email, password: pin });
            if (error) throw error;
            
            localStorage.setItem('launchpad_email', email);
            location.reload(); 
        }
    } catch (err) {
        errorEl.innerText = err.message;
        errorEl.style.display = 'block';
        btn.disabled = false;
    }
}

async function updateMultiValue(rowNum, dayLabel, newValue) {
    // 1. Ignore if user clicks the placeholder or if it's an empty reset
    if (!newValue || newValue === "") return; 

    const element = document.getElementById(`${dayLabel}-r${rowNum}-c6`);
    let currentContent = element.getAttribute('data-selected') || "";
    let items = currentContent ? currentContent.split(', ').filter(x => x) : [];

    // Toggle logic
    const index = items.indexOf(newValue);
    if (index === -1) items.push(newValue);
    else items.splice(index, 1);

    const updatedString = items.join(', ');

    // 2. Lock the data into the attribute
    element.setAttribute('data-selected', updatedString);
    
    // 3. Update the UI Text
    if (items.length > 0) {
        element.options[0].text = `Selected (${items.length}): ${updatedString}`;
        element.style.backgroundColor = "#e7f3ff";
    } else {
        element.options[0].text = "+ Add Multi";
        element.style.backgroundColor = "";
    }

    // 4. Force the cloud save with the string directly (bypass the element's current value)
    await saveRow(rowNum, dayLabel, updatedString);

    // 5. Reset visual selection ONLY AFTER the save process has the data
    element.value = ""; 
}

async function deleteFullRow(wrapperId) {
    if (confirm("Delete this entire line?")) {
        const rowNumericId = parseInt(wrapperId.replace('row-wrapper-', ''));
        
        // --- THE FIX: Lock this row so the sync ignores it ---
        deletingRows.add(rowNumericId);

        const rowElement = document.getElementById(wrapperId);
        if (rowElement) {
            rowElement.style.display = 'none';
            rowElement.removeAttribute('data-occupied');
            
            const cells = rowElement.querySelectorAll('input, select, textarea, .status-cell');
            cells.forEach(cell => {
                if (cell.classList.contains('status-cell')) cell.innerText = "...";
                else cell.value = "";
                applyCellColor(cell, "");
            });
        }

        try {
            const { error } = await _supabase
                .from('BackEndData')
                .delete()
                .eq('id', rowNumericId);

            if (error) throw error;
            console.log(`✅ Row ${rowNumericId} permanently deleted.`);
        } catch (err) {
            console.error("Delete error:", err.message);
            // If delete fails, unlock it so it can try again
            deletingRows.delete(rowNumericId);
        }
    }
}

async function lookupColumn5Value(rowNum, dayLabel, isBackground = false) {
    const val3 = document.getElementById(`${dayLabel}-r${rowNum}-c3`)?.value;
    const val4 = document.getElementById(`${dayLabel}-r${rowNum}-c4`)?.value;
    const col5 = document.getElementById(`${dayLabel}-r${rowNum}-c5`);

    if (!val3 || val3 === "" || !val4 || val4 === "" || !col5) {
        if (col5) col5.innerText = "..."; 
        return;
    }

    const currentText = col5.innerText;

    try {
        // --- THE FIX: Only show indicator if NOT a background sync ---
        if (!isBackground) {
            col5.innerText = "⏳ Checking...";
        }

        const url = `${GOOGLE_SCRIPT_URL}?action=lookup&col3=${encodeURIComponent(val3)}&col4=${encodeURIComponent(val4)}`;
        const response = await fetch(url);
        const data = await response.json();

        if (data && data.result) {
            if (data.result !== currentText) {
                col5.innerText = data.result;
                applyCellColor(col5, data.result);
                await saveRow(rowNum, dayLabel); 
            }
        } else if (!isBackground) {
            col5.innerText = "NA";
        }
    } catch (e) {
        console.error("VLOOKUP Pull Error:", e);
        if (!isBackground) col5.innerText = "Error";
    }
}

async function saveRow(rowNum, dayLabel, col6Override = null) {
    const syncKey = `${dayLabel}-${rowNum}`;
    if (activeSyncs.has(syncKey)) return;
    activeSyncs.add(syncKey);

    const wrapper = document.getElementById(`row-wrapper-${rowNum}`);
    if (wrapper) {
        wrapper.setAttribute('data-occupied', 'true');
    }

    const rowData = {
        id: rowNum,          // e.g., 2026042005
        day_label: dayLabel, // e.g., "2026-04-20"
        col1: document.getElementById(`${dayLabel}-r${rowNum}-c1`)?.value || "",
        col2: document.getElementById(`${dayLabel}-r${rowNum}-c2`)?.value || "",
        col3: document.getElementById(`${dayLabel}-r${rowNum}-c3`)?.value || "",
        col4: document.getElementById(`${dayLabel}-r${rowNum}-c4`)?.value || "",
        col5: document.getElementById(`${dayLabel}-r${rowNum}-c5`)?.innerText || "", // Column 5 is a Span
        col6: col6Override !== null ? col6Override : (document.getElementById(`${dayLabel}-r${rowNum}-c6`)?.getAttribute('data-selected') || ""),
        col7: document.getElementById(`${dayLabel}-r${rowNum}-c7`)?.value || "",
        col8: document.getElementById(`${dayLabel}-r${rowNum}-c8`)?.value || ""
    };

    try {
        const { error } = await _supabase.from('BackEndData').upsert(rowData, { onConflict: 'id' });
        if (!error) document.getElementById('saveIndicator').innerText = `Last saved at: ${getTimestamp()}`;
    } catch (err) {
        console.error("🔴 Save Error:", err);
    } finally {
        activeSyncs.delete(syncKey);
    }
}

let currentView = 'view2'; // Default view

function applyViewFilter(viewId) {
    const sections = document.querySelectorAll('.section-container');
    const weekContainers = document.querySelectorAll('.week-container');

    // 1. Reset everything to visible first
    sections.forEach(s => s.style.display = 'block');
    weekContainers.forEach(w => w.style.display = 'block');

    // 2. Define the date range logic
    const today = new Date();
    today.setHours(0, 0, 0, 0);

    let targetDate = null;

    if (viewId === 'view2') {
        // 3 Day Look Ahead (Today + 2)
        targetDate = new Date(today);
        targetDate.setDate(today.getDate() + 2);
    } else if (viewId === 'view3') {
        // 1 Week Look Ahead (Today + 6)
        targetDate = new Date(today);
        targetDate.setDate(today.getDate() + 6);
    }

    // 3. Apply the filter if a Look Ahead view is selected
    if (targetDate) {
        sections.forEach(section => {
            const rowsDiv = section.querySelector('.rows-container');
            if (!rowsDiv) return;
            
            // Extract YYYY-MM-DD from ID: rows-2026-04-20
            const dateStr = rowsDiv.id.replace('rows-', '');
            const [y, m, d] = dateStr.split('-').map(Number);
            const sectionDate = new Date(y, m - 1, d);
            sectionDate.setHours(0, 0, 0, 0);

            // Hide if date is in the past OR beyond our target window
            if (sectionDate < today || sectionDate > targetDate) {
                section.style.display = 'none';
            }
        });

        // 4. Clean up the Week Accordions
        weekContainers.forEach(week => {
            const visibleDays = Array.from(week.querySelectorAll('.section-container'))
                                     .filter(s => s.style.display !== 'none');
            
            if (visibleDays.length === 0) {
                week.style.display = 'none';
            } else {
                // Auto-expand the week so the user sees the filtered days immediately
                const content = week.querySelector('.week-content');
                const arrow = week.querySelector('.week-arrow');
                if (content) content.classList.remove('hidden');
                if (arrow) arrow.innerText = '▼';
            }
        });
    } else {
        // OVERALL SCHEDULE: ViewId 'view1' or default
        // Standard behavior: make sure everything is expanded or follows default state
        expandAllWeeks(); 
    }
}

async function switchView(viewId, buttonElement) {
    currentView = viewId;
    
    // 1. Update Button Styles
    document.querySelectorAll('.view-btn').forEach(btn => btn.classList.remove('active'));
    buttonElement.classList.add('active');

    // 2. Apply Visibility Filter
    applyViewFilter(viewId);

    // 3. Optional: Sync data to ensure current view is fresh
    await loadData();
}

// 1. Only targets the green Week bars
function expandAllWeeks() {
    document.querySelectorAll('.week-content').forEach((content, i) => {
        content.classList.remove('hidden');
        const arrow = document.querySelectorAll('.week-arrow')[i];
        if (arrow) arrow.innerText = '▼';
    });
}

// 2. Only targets the grey Day bars
function expandAllDays() {
    document.querySelectorAll('.rows-container').forEach((container, i) => {
        container.classList.remove('hidden');
        const arrow = document.querySelectorAll('.arrow')[i];
        if (arrow) arrow.innerText = '▼';
    });
}

// 3. The "Reset" - hides everything
function collapseEverything() {
    // Hide all Week contents
    document.querySelectorAll('.week-content').forEach((content, i) => {
        content.classList.add('hidden');
        const arrow = document.querySelectorAll('.week-arrow')[i];
        if (arrow) arrow.innerText = '▶';
    });

    // Hide all Day contents
    document.querySelectorAll('.rows-container').forEach((container, i) => {
        container.classList.add('hidden');
        const arrow = document.querySelectorAll('.arrow')[i];
        if (arrow) arrow.innerText = '▶';
    });
}

function autoCleanUI() {
    const now = new Date();
    const todayStr = [
        now.getFullYear(),
        String(now.getMonth() + 1).padStart(2, '0'),
        String(now.getDate()).padStart(2, '0')
    ].join('-');

    console.log("🧹 Protected Cleanup starting...");

    const allRows = document.querySelectorAll('[data-date]');

    allRows.forEach(row => {
        const rowDate = row.getAttribute('data-date');
        
        // 1. Is the row from a past date?
        if (rowDate < todayStr) {
            
            // 2. Is this row "Occupied" by Supabase data?
            const isOccupied = row.getAttribute('data-occupied') === 'true';

            if (!isOccupied) {
                // 3. Secondary check: Are the columns actually still empty?
                const col3 = row.querySelector(`[id$="-c3"]`);
                const col4 = row.querySelector(`[id$="-c4"]`);
                
                const val3 = col3?.value?.toLowerCase() || "";
                const val4 = col4?.value?.toLowerCase() || "";
                
                const isTrulyEmpty = (val3 === "" || val3.includes("select")) && 
                                     (val4 === "" || val4.includes("select"));

                if (isTrulyEmpty) {
                    row.style.display = 'none';
                }
            } else {
                // Row has data! Ensure it is visible.
                row.style.display = 'flex';
            }
        } else {
            // Today or Future: Always visible.
            row.style.display = 'flex';
        }
    });
}

    } else if (col === 5) {

} else {

    }

}
applyCellColor(el, content);
}
                }
            });
            return true;
        }

    }

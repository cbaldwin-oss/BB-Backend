const WEEKS_TO_SHOW = 2; 
const INITIAL_ROWS = 20;

    <script>

        const { createClient } = supabase;

const contentArea = document.getElementById('main-content-area');

function createSections() {
    const contentArea = document.getElementById('main-content-area');
    if (!contentArea) return;
    
    contentArea.innerHTML = ''; 
    const baseDate = new Date(START_DATE + "T00:00:00");

    for (let w = 0; w < WEEKS_TO_SHOW; w++) {
        // --- 1. BUILD WEEK CONTAINER ---
        const weekDiv = document.createElement('div');
        weekDiv.className = 'week-container';

        const weekStart = new Date(baseDate);
        weekStart.setDate(baseDate.getDate() + (w * 7));
        const weekEnd = new Date(weekStart);
        weekEnd.setDate(weekStart.getDate() + 6);

        const weekHeader = document.createElement('div');
        weekHeader.className = 'week-header';
        weekHeader.innerHTML = `
            <span>Week of ${weekStart.toLocaleDateString([], {month:'short', day:'numeric'})} - ${weekEnd.toLocaleDateString([], {month:'short', day:'numeric'})}</span>
            <span class="week-arrow">▼</span>
        `;

        const weekContent = document.createElement('div');
        weekContent.className = 'week-content';

        // Week Toggle
        weekHeader.onclick = () => {
            const isHidden = weekContent.classList.toggle('hidden');
            weekHeader.querySelector('.week-arrow').innerText = isHidden ? '▶' : '▼';
        };

        // --- 2. BUILD DAYS INSIDE WEEK ---
        for (let d = 0; d < 7; d++) {
            const sectionDate = new Date(weekStart);
            sectionDate.setDate(weekStart.getDate() + d);
            const dateId = sectionDate.toISOString().split('T')[0];
            const dateString = sectionDate.toLocaleDateString('en-US', { weekday: 'long', month: 'long', day: 'numeric' });

            const section = document.createElement('div');
            section.className = 'section-container';

            const header = document.createElement('div');
            header.className = 'date-header';
            header.innerHTML = `<span>${dateString}</span> <span class="arrow">▼</span>`;
            
            const rowsDiv = document.createElement('div');
            rowsDiv.className = 'rows-container';
            rowsDiv.id = `rows-${dateId}`;

            // Day Toggle (Crucial: stopPropagation prevents week-header from firing)
            header.onclick = (e) => {
                e.stopPropagation();
                const isHidden = rowsDiv.classList.toggle('hidden');
                header.querySelector('.arrow').innerText = isHidden ? '▶' : '▼';
            };

            // Reuse your existing addRows function
            addRowsToContainer(rowsDiv, dateId, INITIAL_ROWS);

            const addBtn = document.createElement('button');
            addBtn.className = 'add-rows-btn';
            addBtn.innerText = "+ Add 5 Rows";
            addBtn.onclick = (e) => {
                e.stopPropagation(); // Keep week from collapsing when adding rows
                addRowsToContainer(rowsDiv, dateId, 5, addBtn);
            };

            rowsDiv.appendChild(addBtn);
            section.appendChild(header);
            section.appendChild(rowsDiv);
            weekContent.appendChild(section);
        }

        weekDiv.appendChild(weekHeader);
        weekDiv.appendChild(weekContent);
        contentArea.appendChild(weekDiv);
    }
    loadData(); // Final sync with Supabase
}

function addRowsToContainer(container, dateId, count, anchorBtn = null) {
    const existingRowCount = container.querySelectorAll('.cell-row').length;
    
    for (let r = 0; r < count; r++) {
        const rowIdx = Date.now() + Math.random(); // Unique timestamp ID for the row
        const rowDiv = document.createElement('div');
        rowDiv.className = 'cell-row';
        rowDiv.id = `row-wrapper-${rowIdx}`;
        
        // Create 2 Inputs (e.g., Task Name and Notes)
        const input1 = createInput(`${dateId}-r${rowIdx}-c1`, "Task...");
        const input2 = createInput(`${dateId}-r${rowIdx}-c2`, "Notes...");

        // Create Delete Button
        const delBtn = document.createElement('button');
        delBtn.className = 'delete-btn';
        delBtn.innerHTML = '×';
        delBtn.title = "Delete Line";
        delBtn.onclick = () => deleteFullRow(rowDiv.id, [`${dateId}-r${rowIdx}-c1`, `${dateId}-r${rowIdx}-c2`]);

        rowDiv.appendChild(input1);
        rowDiv.appendChild(input2);
        rowDiv.appendChild(delBtn);

        // If button exists, insert rows BEFORE the button
        if (anchorBtn) {
            container.insertBefore(rowDiv, anchorBtn);
        } else {
            container.appendChild(rowDiv);
        }
    }
    loadData();
}

function createInput(id, placeholder) {
    const input = document.createElement('input');
    input.id = id;
    input.placeholder = placeholder;
    input.onblur = () => saveCell(id, input.value);
    return input;
}

let allWeeksCollapsed = false; // Track the global state

function toggleAllSections() {
    const weekContents = document.querySelectorAll('.week-content');
    const weekArrows = document.querySelectorAll('.week-arrow');
    const btn = document.getElementById('collapse-all-btn');
    
    // Toggle the state
    allWeeksCollapsed = !allWeeksCollapsed;

    weekContents.forEach((content, index) => {
        if (allWeeksCollapsed) {
            // Force collapse
            content.classList.add('hidden');
            if (weekArrows[index]) weekArrows[index].innerText = '▶';
        } else {
            // Force expand
            content.classList.remove('hidden');
            if (weekArrows[index]) weekArrows[index].innerText = '▼';
        }
    });

    // Update the button text to show the next action
    btn.innerText = allWeeksCollapsed ? "Expand All Weeks" : "Collapse All Weeks";
}

async function deleteFullRow(wrapperId, cellIds) {
    if (confirm("Delete this entire line?")) {
        // 1. Remove from Screen
        document.getElementById(wrapperId).remove();

        // 2. Remove from Supabase
        const { error } = await _supabase
            .from('cells')
            .delete()
            .in('id', cellIds);

        if (error) console.error("Delete error:", error.message);
    }
}

async function saveCell(id, content) {
    const indicator = document.getElementById('saveIndicator');
    indicator.innerText = "Saving...";
    await _supabase.from('cells').upsert({ id, content }, { onConflict: 'id' });
    indicator.innerText = "Saved";
}

// Initialize
createSections();
        // 3. Load Data from Supabase
let currentView = 'view1'; // Default view

async function switchView(viewId, buttonElement) {
    currentView = viewId;
    
    // 1. Update Button Styles
    document.querySelectorAll('.view-btn').forEach(btn => btn.classList.remove('active'));
    buttonElement.classList.add('active');

    // 2. Clear the screen immediately for the new view
    document.querySelectorAll('input').forEach(input => input.value = '');

    // 3. Load data for the new view
    await loadData();
}

// 1. Only targets the green Week bars
function expandAllWeeks() {
    document.querySelectorAll('.week-content').forEach((content, i) => {
        content.classList.remove('hidden');
        const arrow = document.querySelectorAll('.week-arrow')[i];
        if (arrow) arrow.innerText = '▼';
    });
}

// 2. Only targets the grey Day bars
function expandAllDays() {
    document.querySelectorAll('.rows-container').forEach((container, i) => {
        container.classList.remove('hidden');
        const arrow = document.querySelectorAll('.arrow')[i];
        if (arrow) arrow.innerText = '▼';
    });
}

// 3. The "Reset" - hides everything
function collapseEverything() {
    // Hide all Week contents
    document.querySelectorAll('.week-content').forEach((content, i) => {
        content.classList.add('hidden');
        const arrow = document.querySelectorAll('.week-arrow')[i];
        if (arrow) arrow.innerText = '▶';
    });

    // Hide all Day contents
    document.querySelectorAll('.rows-container').forEach((container, i) => {
        container.classList.add('hidden');
        const arrow = document.querySelectorAll('.arrow')[i];
        if (arrow) arrow.innerText = '▶';
    });
}

// UPDATE YOUR SAVE LOGIC (inside the loop)
input.onblur = async () => {
    const { error } = await _supabase
        .from('cells')
        .upsert({ 
            id: `${currentView}-${cellId}`, // Unique ID for this view/cell combo
            content: input.value,
            view_id: currentView 
        }, { onConflict: 'id' });
};

// UPDATE YOUR LOAD LOGIC
async function loadData() {
    const { data } = await _supabase.from('cells').select('*');
    if (data) {
        data.forEach(row => {
            const cell = document.getElementById(row.id);
            if (cell) cell.value = row.content;
        });
    }
}

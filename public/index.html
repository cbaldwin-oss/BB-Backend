function refreshDropdowns() {
    console.log("🔄 Syncing dropdown options...");
    const selects = document.querySelectorAll('select');
    
    selects.forEach(select => {
        const parts = select.id.split('-c');
        if (parts.length < 2) return;
        
        const colNum = parseInt(parts[1]);
        const colKey = `col${colNum}`;
        const options = window.dropdownData[colKey] || [];
        
        // Save state before clearing
        const savedValue = select.value;
        const savedMultiText = select.getAttribute('data-selected');

        select.innerHTML = '';

        // Create Placeholder (Option 0)
        const def = document.createElement('option');
        def.value = "";
        
        // Restore Multi-Select label if it exists
        if (colNum === 6 && savedMultiText) {
            def.text = `Selected: ${savedMultiText}`;
        } else {
            def.text = colNum === 6 ? "+ Add Multi" : "Select...";
        }
        select.appendChild(def);

        // Fill Options
        options.forEach(text => {
            const opt = document.createElement('option');
            opt.value = text;
            opt.text = text;
            select.appendChild(opt);
        });

        // Restore selection
        select.value = savedValue;
    });
}

function applyCellColor(element, value) {
    if (!element) return;

    // 1. DATA CAPTURE
    let capturedValue = value;
    if (capturedValue === undefined || capturedValue === null) {
        capturedValue = element.getAttribute('data-selected') || element.value || "";
    }

    // 2. COLUMN 6 (MULTI-SELECT) DYNAMIC SIZING
    const isColumn6 = element.id && element.id.endsWith("-c6");
    if (isColumn6) {
        let rawList = capturedValue.toString().replace(/^Selected:\s*/i, "").trim();

        if (rawList && rawList !== "" && rawList !== "+ Add Multi") {
            element.style.backgroundColor = "#e7f3ff";
            element.style.color = "#0056b3";
            element.style.fontWeight = "bold";

            if (element.options && element.options[0]) {
                element.options[0].text = `Selected: ${rawList}`;
                
                // --- GOOGLE SHEETS DYNAMIC SIZING ---
                // We estimate height based on character count. 
                // A standard cell fits ~25-30 chars per line.
                const charCount = rawList.length + 10; // +10 for "Selected: "
                if (charCount > 30) {
                    // Calculate how many rows of text we need
                    const estimatedLines = Math.ceil(charCount / 28); 
                    const newHeight = (estimatedLines * 20) + 10; // 20px per line + padding
                    element.style.height = newHeight + "px";
                } else {
                    element.style.height = "40px"; // Default height
                }
            }
        } else {
            element.style.backgroundColor = "transparent";
            element.style.height = "40px"; // Reset
            if (element.options && element.options[0]) {
                element.options[0].text = "+ Add Multi";
            }
        }
        return; 
    }

    // 3. STANDARD COLUMN LOGIC (1-5, 7, 8)
    element.style.backgroundColor = "#e7f3ff"; // Default filled
    element.style.color = "#333";
    element.style.fontWeight = "normal";

    const cleanVal = capturedValue.toString().trim();
    const lowerVal = cleanVal.toLowerCase();

    if (cleanVal === "" || lowerVal === "select...") {
        element.style.backgroundColor = "transparent";
        return;
    }

    // Priority Colors
    if (lowerVal.includes("high") || lowerVal.includes("pass") || lowerVal.includes("active")) {
        element.style.backgroundColor = "#d4edda";
        element.style.color = "#155724";
        element.style.fontWeight = "bold";
    } 
    else if (lowerVal.includes("med") || lowerVal.includes("pending") || lowerVal.includes("hold")) {
        element.style.backgroundColor = "#fff3cd";
        element.style.color = "#856404";
        element.style.fontWeight = "bold";
    } 
    else if (lowerVal.includes("low") || lowerVal.includes("fail") || lowerVal.includes("urgent")) {
        element.style.backgroundColor = "#f8d7da";
        element.style.color = "#721c24";
        element.style.fontWeight = "bold";
    }
}

async function fetchDropdownOptions() {
    console.log("🛠️ Step 1: Fetching options from Supabase...");
    
    // 1. Fetch from Supabase
    const { data, error } = await _supabase
        .from('dropdownoptions')
        .select('column_key, option_text');

    if (error) {
        console.error("❌ Supabase Fetch Error:", error.message);
        return;
    }

    if (!data || data.length === 0) {
        console.warn("⚠️ Database connected, but table 'DropdownOptions' is empty or RLS is blocking rows.");
    }

    // 2. Clear and fill the global object
    window.dropdownData = { col1:[], col2:[], col3:[], col4:[], col6:[], col7:[] };
    
    data.forEach(item => {
        if (window.dropdownData[item.column_key]) {
            window.dropdownData[item.column_key].push(item.option_text);
        } else {
            console.warn(`❓ Unknown column_key found in DB: ${item.column_key}`);
        }
    });

    console.log("✅ Dropdown data fully loaded:", window.dropdownData);
}

// Helper to create stable, short integers for Supabase int4
function generateNumericId(dayLabel, index) {
    const dayMap = { 
        "Monday": 1, "Tuesday": 2, "Wednesday": 3, "Thursday": 4, 
        "Friday": 5, "Saturday": 6, "Sunday": 7 
    };
    // Format: DayDigit + RowIndex (e.g., Monday Row 5 = 105)
    return (dayMap[dayLabel] || 0) * 100 + index;
}

function addRowsToContainer(container, dayLabel, count, anchorBtn = null) {
    for (let r = 0; r < count; r++) {
        // --- CHANGE: Use stable numeric ID instead of Date.now() ---
        const rowNumericId = generateNumericId(dayLabel, r);
        
        const rowDiv = document.createElement('div');
        rowDiv.className = 'cell-row';
        rowDiv.id = `row-wrapper-${rowNumericId}`;

        for (let col = 1; col <= 8; col++) {
            const cellId = `${dayLabel}-r${rowNumericId}-c${col}`;
            let element;

            if ([1, 2, 3, 4, 6, 7].includes(col)) {
                element = document.createElement('select');
                element.id = cellId;
                
                const defaultOpt = document.createElement('option');
                defaultOpt.value = "";
                defaultOpt.text = (col === 6) ? "+ Add Multi" : "Select...";
                element.appendChild(defaultOpt);

                const options = dropdownData[`col${col}`] || [];
                options.forEach(text => {
                    const opt = document.createElement('option');
                    opt.value = text;
                    opt.text = text;
                    element.appendChild(opt);
                });

element.onchange = () => {
    // Check if this is the "Trade Partners" column
    if (col === 6) {
        // CALL THE SPECIAL FUNCTION
        updateMultiValue(rowNumericId, dayLabel, element.value);
    } else {
        // Standard save for all other columns
        applyCellColor(element, element.value);
        saveRow(rowNumericId, dayLabel);
    }
};
            } else {
                element = document.createElement('input');
                element.id = cellId;
                element.placeholder = "...";
                element.onblur = () => {
                    applyCellColor(element, element.value);
                    saveRow(rowNumericId, dayLabel);
                };
            }
            rowDiv.appendChild(element);
        }
        
        if (anchorBtn) {
            container.insertBefore(rowDiv, anchorBtn);
        } else {
            container.appendChild(rowDiv);
        }
    }
}

const contentArea = document.getElementById('main-content-area');

function createSections() {
    const contentArea = document.getElementById('main-content-area');
    if (!contentArea) return;
    
    contentArea.innerHTML = ''; 
    const baseDate = new Date(START_DATE + "T00:00:00");

    for (let w = 0; w < WEEKS_TO_SHOW; w++) {
        // --- 1. BUILD WEEK CONTAINER ---
        const weekDiv = document.createElement('div');
        weekDiv.className = 'week-container';

        const weekStart = new Date(baseDate);
        weekStart.setDate(baseDate.getDate() + (w * 7));
        const weekEnd = new Date(weekStart);
        weekEnd.setDate(weekStart.getDate() + 6);

        const weekHeader = document.createElement('div');
        weekHeader.className = 'week-header';
        weekHeader.innerHTML = `
            <span>Week of ${weekStart.toLocaleDateString([], {month:'short', day:'numeric'})} - ${weekEnd.toLocaleDateString([], {month:'short', day:'numeric'})}</span>
            <span class="week-arrow">▼</span>
        `;

        const weekContent = document.createElement('div');
        weekContent.className = 'week-content';

        // Week Toggle
        weekHeader.onclick = () => {
            const isHidden = weekContent.classList.toggle('hidden');
            weekHeader.querySelector('.week-arrow').innerText = isHidden ? '▶' : '▼';
        };

        // --- 2. BUILD DAYS INSIDE WEEK ---
        for (let d = 0; d < 7; d++) {
            const sectionDate = new Date(weekStart);
            sectionDate.setDate(weekStart.getDate() + d);
            const dateId = sectionDate.toISOString().split('T')[0];
            const dateString = sectionDate.toLocaleDateString('en-US', { weekday: 'long', month: 'long', day: 'numeric' });

            const section = document.createElement('div');
            section.className = 'section-container';

            const header = document.createElement('div');
            header.className = 'date-header';
            header.innerHTML = `<span>${dateString}</span> <span class="arrow">▼</span>`;
            
            const rowsDiv = document.createElement('div');
            rowsDiv.className = 'rows-container';
            rowsDiv.id = `rows-${dateId}`;

            // Day Toggle (Crucial: stopPropagation prevents week-header from firing)
            header.onclick = (e) => {
                e.stopPropagation();
                const isHidden = rowsDiv.classList.toggle('hidden');
                header.querySelector('.arrow').innerText = isHidden ? '▶' : '▼';
            };

            // Reuse your existing addRows function
            addRowsToContainer(rowsDiv, dateId, INITIAL_ROWS);

            const addBtn = document.createElement('button');
            addBtn.className = 'add-rows-btn';
            addBtn.innerText = "+ Add 5 Rows";
            addBtn.onclick = (e) => {
                e.stopPropagation(); // Keep week from collapsing when adding rows
                addRowsToContainer(rowsDiv, dateId, 5, addBtn);
            };

            rowsDiv.appendChild(addBtn);
            section.appendChild(header);
            section.appendChild(rowsDiv);
            weekContent.appendChild(section);
        }

        weekDiv.appendChild(weekHeader);
        weekDiv.appendChild(weekContent);
        contentArea.appendChild(weekDiv);
    }
}


let allWeeksCollapsed = false; // Track the global state

function toggleAllSections() {
    const weekContents = document.querySelectorAll('.week-content');
    const weekArrows = document.querySelectorAll('.week-arrow');
    const btn = document.getElementById('collapse-all-btn');
    
    // Toggle the state
    allWeeksCollapsed = !allWeeksCollapsed;

    weekContents.forEach((content, index) => {
        if (allWeeksCollapsed) {
            // Force collapse
            content.classList.add('hidden');
            if (weekArrows[index]) weekArrows[index].innerText = '▶';
        } else {
            // Force expand
            content.classList.remove('hidden');
            if (weekArrows[index]) weekArrows[index].innerText = '▼';
        }
    });

    // Update the button text to show the next action
    btn.innerText = allWeeksCollapsed ? "Expand All Weeks" : "Collapse All Weeks";
}

async function updateMultiValue(rowNum, dayLabel, newValue) {
    // 1. Ignore if user clicks the placeholder or if it's an empty reset
    if (!newValue || newValue === "") return; 

    const element = document.getElementById(`${dayLabel}-r${rowNum}-c6`);
    let currentContent = element.getAttribute('data-selected') || "";
    let items = currentContent ? currentContent.split(', ').filter(x => x) : [];

    // Toggle logic
    const index = items.indexOf(newValue);
    if (index === -1) items.push(newValue);
    else items.splice(index, 1);

    const updatedString = items.join(', ');

    // 2. Lock the data into the attribute
    element.setAttribute('data-selected', updatedString);
    
    // 3. Update the UI Text
    if (items.length > 0) {
        element.options[0].text = `Selected (${items.length}): ${updatedString}`;
        element.style.backgroundColor = "#e7f3ff";
    } else {
        element.options[0].text = "+ Add Multi";
        element.style.backgroundColor = "";
    }

    // 4. Force the cloud save with the string directly (bypass the element's current value)
    await saveRow(rowNum, dayLabel, updatedString);

    // 5. Reset visual selection ONLY AFTER the save process has the data
    element.value = ""; 
}

async function deleteFullRow(wrapperId, cellIds) {
    if (confirm("Delete this entire line?")) {
        // 1. Remove from Screen
        document.getElementById(wrapperId).remove();

        // 2. Remove from Supabase
        const { error } = await _supabase
            .from('cells')
            .delete()
            .in('id', cellIds);

        if (error) console.error("Delete error:", error.message);
    }
}

async function saveRow(rowNum, dayLabel, col6Override = null) {
    const syncKey = `${dayLabel}-${rowNum}`;
    
    // 1. SYNC GUARD: Prevents overlapping saves
    if (activeSyncs.has(syncKey)) return;
    activeSyncs.add(syncKey);

    const status = document.getElementById('saveIndicator');
    if (status) status.innerText = "Syncing with Cloud...";

    // 2. DATA CAPTURE
    const col6Element = document.getElementById(`${dayLabel}-r${rowNum}-c6`);
    const storedMultiValue = col6Element ? col6Element.getAttribute('data-selected') : "";
    
    // Logic: Use override if provided, otherwise the attribute
    const finalCol6 = col6Override !== null ? col6Override : (storedMultiValue || "");

    const rowData = {
        id: rowNum,
        day_label: dayLabel,
        col1: document.getElementById(`${dayLabel}-r${rowNum}-c1`)?.value || "",
        col2: document.getElementById(`${dayLabel}-r${rowNum}-c2`)?.value || "",
        col3: document.getElementById(`${dayLabel}-r${rowNum}-c3`)?.value || "",
        col4: document.getElementById(`${dayLabel}-r${rowNum}-c4`)?.value || "",
        col5: document.getElementById(`${dayLabel}-r${rowNum}-c5`)?.value || "",
        col6: finalCol6,
        col7: document.getElementById(`${dayLabel}-r${rowNum}-c7`)?.value || "",
        col8: document.getElementById(`${dayLabel}-r${rowNum}-c8`)?.value || ""
    };

    try {
        // 3. CLOUD UPLOAD
        const { error } = await _supabase
            .from('BackEndData')
            .upsert(rowData, { onConflict: 'id' });

        if (error) throw error;

        // 4. THE VISUAL REFRESH (The "Pop-In" Pattern)
        // We select all 8 cells in this specific row
for (let col = 1; col <= 8; col++) {
            const cell = document.getElementById(`${dayLabel}-r${rowNum}-c${col}`);
            if (cell) {
                // For Column 6, we pass the attribute string directly
                // For others, we just let applyCellColor figure it out from the element
                const valToPass = (col === 6) ? cell.getAttribute('data-selected') : cell.value;
                applyCellColor(cell, valToPass);
            }
        }

        if (status) status.innerText = "Saved";
    } catch (err) {
        console.error("🔴 Sync Failure:", err.message);
        if (status) status.innerText = "Sync Error!";
    } finally {
        // 5. RELEASE GUARD
        setTimeout(() => {
            activeSyncs.delete(syncKey);
            if (status && (status.innerText === "Saved" || status.innerText === "Ready")) {
                status.innerText = "";
            }
        }, 1200);
    }
}

let currentView = 'view1'; // Default view

async function switchView(viewId, buttonElement) {
    currentView = viewId;
    
    // 1. Update Button Styles
    document.querySelectorAll('.view-btn').forEach(btn => btn.classList.remove('active'));
    buttonElement.classList.add('active');

    // 2. Clear the screen immediately for the new view
    document.querySelectorAll('input').forEach(input => input.value = '');

    // 3. Load data for the new view
    await loadData();
}

// UPDATE YOUR LOAD LOGIC
async function loadData() {
    console.log("📥 Syncing with Cloud: Fetching row data...");
    const status = document.getElementById('saveIndicator');
    if (status) status.innerText = "Syncing with Cloud...";

    try {
        const { data, error } = await _supabase
            .from('BackEndData')
            .select('*');

        if (error) throw error;

        if (data) {
            data.forEach(row => {
                // Loop through columns 1 to 8 for every row found
                for (let col = 1; col <= 8; col++) {
                    const cellId = `${row.day_label}-r${row.id}-c${col}`;
                    const el = document.getElementById(cellId);
                    
                    if (el) {
                        const content = row[`col${col}`] || "";
                        
                        // --- THE PATTERN MATCH ---
                        
if (col === 6) {
    el.setAttribute('data-selected', content);
    applyCellColor(el, content); // This builds the "Selected: Partner A, Partner B" text
}
                        else {
                            // 1. For all other columns, we set the standard .value
                            el.value = content;
                            // 2. Trigger the standard visual "pop-in" (colors based on text)
                            applyCellColor(el, content);
                        }
                    }
                }
            });
            console.log("✅ Cloud Sync Complete: Data popped into cells.");
    
    return true; // This "resolves" the promise for startApp
        }

        if (status) status.innerText = "Saved";
    } catch (err) {
        console.error("🔴 Load Error:", err.message);
        if (status) status.innerText = "Sync Error!";
    } finally {
        // Clear the status message after a brief moment
        setTimeout(() => {
            if (status && (status.innerText === "Saved" || status.innerText === "Ready")) {
                status.innerText = "";
            }
        }, 2000);
    }
}

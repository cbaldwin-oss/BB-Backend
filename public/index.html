        flex: 1; 
        display: flex;
        align-items: center;
    }

    .header-right {
        justify-content: flex-end; /* Pushes save indicator to the far right */
    }

    /* This section stays in the dead center */
    .header-center {
        flex: 0; /* Only takes up as much space as the text needs */

    .header-center span {

    }

    .view-btn {
    background: none;

    border-bottom: 2px solid transparent;
}
.view-btn.active {
    color: #2e7d32;

}
.section-container {

    }

    .date-header {
        background-color: #f1f3f4;

        display: flex;
        justify-content: space-between;
        align-items: center;
        font-weight: bold;
        color: #2e7d32;
        border-top: 1px solid #ddd;

    .date-header:hover {
        background-color: #e8eaed;
    }

    .rows-container {
        display: block; /* Shown by default */
        padding: 10px 20px;
    }

    .rows-container.hidden {
        display: none;
    }

    .cell-row {
        display: flex;
        gap: 5px;
        margin-bottom: 4px;
    }

    .cell-row input {
        flex: 1;
        padding: 8px;
        border: 1px solid #eee;
        border-radius: 3px;
    }

    .add-rows-btn {
        margin: 10px 0 20px 10px;
        padding: 5px 15px;
        background-color: #ffffff;
        border: 1px dashed #2e7d32;
        color: #2e7d32;
        cursor: pointer;
        border-radius: 4px;
        font-size: 12px;
    }

    .add-rows-btn:hover {
        background-color: #e8f5e9;
    }
    .cell-row {
        display: flex;
        gap: 10px;
        margin-bottom: 8px;
        align-items: center;
    }

    .cell-row input {
        flex: 1;
        padding: 10px;
        border: 1px solid #ddd;
        border-radius: 4px;
        font-size: 14px;
    }

    .delete-btn {
        background: none;
        border: none;
        color: #d32f2f;
        cursor: pointer;
        font-size: 18px;
        padding: 5px 10px;
        border-radius: 4px;
        transition: background 0.2s;
    }

    .delete-btn:hover {
        background-color: #ffebee;
    }

    /* This container holds rows + the add button */
    .rows-container {
        padding: 15px 30px;
        background-color: white;
    }

    .rows-container.hidden {
        display: none;
    }
    .subheader {
        height: 50px;
        background-color: #f8f9fa;
        border-bottom: 1px solid #dcdcdc;
        display: flex;
        align-items: center;
        justify-content: space-between; /* Pushes button to left and Save to right */
        padding: 0 30px;
    }

    .tool-btn {
        background-color: #2e7d32; /* Solid green for visibility */
        color: white;
        border: none;
        padding: 8px 16px;
        border-radius: 4px;
        cursor: pointer;
        font-weight: bold;
        font-size: 13px;
        transition: background 0.2s;
    }

    .tool-btn:hover {
        background-color: #1b5e20;
    }

    #saveIndicator {
        font-size: 13px;
        font-weight: bold;
        color: #2e7d32;
    }
    .week-container {
        margin-bottom: 25px;
        border: 2px solid #2e7d32;
        border-radius: 8px;
        overflow: hidden;
        background: #fff;
    }

    .week-header {
        background-color: #2e7d32; /* Solid Green */
        color: white;
        padding: 15px 25px;
        cursor: pointer;
        display: flex;
        justify-content: space-between;
        align-items: center;
        font-weight: bold;
        font-size: 20px;
    }

    .week-content {
        display: block; /* Visible by default */
    }

    .week-content.hidden {
        display: none;
    }

    .week-arrow {
        font-size: 14px;
        transition: transform 0.2s;
    }
</style>
</head>
<body>

<script>
    const START_DATE = "2026-05-01"; // Format: YYYY-MM-DD
    const DAYS_TO_SHOW = 20;      // Adjust how many days/sections to show
    const INITIAL_ROWS = 20;     // Starting rows per section
</script>

    <script>

const contentArea = document.getElementById('main-content-area');

function createSections() {
    const contentArea = document.getElementById('main-content-area');
    contentArea.innerHTML = ''; 
    
    // Parse our starting date
    const baseDate = new Date(START_DATE + "T00:00:00");

    for (let w = 0; w < WEEKS_TO_SHOW; w++) {
        // 1. Create the Week Wrapper
        const weekDiv = document.createElement('div');
        weekDiv.className = 'week-container';

        // Calculate the Monday of this specific week
        const weekStart = new Date(baseDate);
        weekStart.setDate(baseDate.getDate() + (w * 7));
        
        // Calculate the Sunday of this specific week
        const weekEnd = new Date(weekStart);
        weekEnd.setDate(weekStart.getDate() + 6);

        // 2. Create the Week Header
        const weekHeader = document.createElement('div');
        weekHeader.className = 'week-header';
        weekHeader.innerHTML = `
            <span>Week of ${weekStart.toLocaleDateString([], {month:'short', day:'numeric'})} - ${weekEnd.toLocaleDateString([], {month:'short', day:'numeric'})}</span>
            <span class="week-arrow">▼</span>
        `;

        const weekContent = document.createElement('div');
        weekContent.className = 'week-content';

        // Toggle the entire week
        weekHeader.onclick = () => {
            weekContent.classList.toggle('hidden');
            weekHeader.querySelector('.week-arrow').innerText = weekContent.classList.contains('hidden') ? '▶' : '▼';
        };

        // 3. Loop 7 times to create the Days inside the week
        for (let d = 0; d < 7; d++) {
            const sectionDate = new Date(weekStart);
            sectionDate.setDate(weekStart.getDate() + d);
            
            const dateString = sectionDate.toLocaleDateString('en-US', { weekday: 'long', month: 'long', day: 'numeric' });
            const dateId = sectionDate.toISOString().split('T')[0];

            const section = document.createElement('div');
            section.className = 'section-container';

            const header = document.createElement('div');
            header.className = 'date-header';
            header.innerHTML = `<span>${dateString}</span> <span class="arrow">▼</span>`;
            
            const rowsDiv = document.createElement('div');
            rowsDiv.className = 'rows-container';
            rowsDiv.id = `rows-${dateId}`;

            header.onclick = (e) => {
                // Prevent clicking the day header from collapsing the week
                e.stopPropagation(); 
                rowsDiv.classList.toggle('hidden');
                header.querySelector('.arrow').innerText = rowsDiv.classList.contains('hidden') ? '▶' : '▼';
            };

            // Add the initial rows for this day
            addRowsToContainer(rowsDiv, dateId, INITIAL_ROWS);

            // Add the "+ 5 Rows" button inside the day container
            const addBtn = document.createElement('button');
            addBtn.className = 'add-rows-btn';
            addBtn.innerText = "+ Add 5 Rows";
            addBtn.onclick = () => addRowsToContainer(rowsDiv, dateId, 5, addBtn);

            rowsDiv.appendChild(addBtn);
            section.appendChild(header);
            section.appendChild(rowsDiv);
            weekContent.appendChild(section);
        }

        weekDiv.appendChild(weekHeader);
        weekDiv.appendChild(weekContent);
        contentArea.appendChild(weekDiv);
    }
}

function addRowsToContainer(container, dateId, count, anchorBtn = null) {
    const existingRowCount = container.querySelectorAll('.cell-row').length;
    
    for (let r = 0; r < count; r++) {
        const rowIdx = Date.now() + Math.random(); // Unique timestamp ID for the row
        const rowDiv = document.createElement('div');
        rowDiv.className = 'cell-row';
        rowDiv.id = `row-wrapper-${rowIdx}`;
        
        // Create 2 Inputs (e.g., Task Name and Notes)
        const input1 = createInput(`${dateId}-r${rowIdx}-c1`, "Task...");
        const input2 = createInput(`${dateId}-r${rowIdx}-c2`, "Notes...");

        // Create Delete Button
        const delBtn = document.createElement('button');
        delBtn.className = 'delete-btn';
        delBtn.innerHTML = '×';
        delBtn.title = "Delete Line";
        delBtn.onclick = () => deleteFullRow(rowDiv.id, [`${dateId}-r${rowIdx}-c1`, `${dateId}-r${rowIdx}-c2`]);

        rowDiv.appendChild(input1);
        rowDiv.appendChild(input2);
        rowDiv.appendChild(delBtn);

        // If button exists, insert rows BEFORE the button
        if (anchorBtn) {
            container.insertBefore(rowDiv, anchorBtn);
        } else {
            container.appendChild(rowDiv);
        }
    }
    loadData();
}

function createInput(id, placeholder) {
    const input = document.createElement('input');
    input.id = id;
    input.placeholder = placeholder;
    input.onblur = () => saveCell(id, input.value);
    return input;
}

let allCollapsed = false; // Track the state globally

function toggleAllSections() {
    const weekContents = document.querySelectorAll('.week-content');
    const arrows = document.querySelectorAll('.week-arrow');
    const btn = document.getElementById('collapse-all-btn');
    
    allCollapsed = !allCollapsed;

    weekContents.forEach((content, i) => {
        if (allCollapsed) {
            content.classList.add('hidden');
            arrows[i].innerText = '▶';
        } else {
            content.classList.remove('hidden');
            arrows[i].innerText = '▼';
        }
    });

    btn.innerText = allCollapsed ? "Expand All Weeks" : "Collapse All Weeks";
}

async function deleteFullRow(wrapperId, cellIds) {
    if (confirm("Delete this entire line?")) {
        // 1. Remove from Screen
        document.getElementById(wrapperId).remove();

        // 2. Remove from Supabase
        const { error } = await _supabase
            .from('cells')
            .delete()
            .in('id', cellIds);

        if (error) console.error("Delete error:", error.message);
    }
}

async function saveCell(id, content) {
    const indicator = document.getElementById('saveIndicator');
    indicator.innerText = "Saving...";
    await _supabase.from('cells').upsert({ id, content }, { onConflict: 'id' });
    indicator.innerText = "Saved";
}

// Initialize
createSections();
        // 3. Load Data from Supabase
let currentView = 'view1'; // Default view

async function switchView(viewId, buttonElement) {
    currentView = viewId;
    
    // 1. Update Button Styles
    document.querySelectorAll('.view-btn').forEach(btn => btn.classList.remove('active'));
    buttonElement.classList.add('active');

    // 2. Clear the screen immediately for the new view
    document.querySelectorAll('input').forEach(input => input.value = '');

    // 3. Load data for the new view
    await loadData();
}

// UPDATE YOUR SAVE LOGIC (inside the loop)
input.onblur = async () => {
    const { error } = await _supabase
        .from('cells')
        .upsert({ 
            id: `${currentView}-${cellId}`, // Unique ID for this view/cell combo
            content: input.value,
            view_id: currentView 
        }, { onConflict: 'id' });
};

// UPDATE YOUR LOAD LOGIC
async function loadData() {
    const { data } = await _supabase.from('cells').select('*');
    if (data) {
        data.forEach(row => {
            const cell = document.getElementById(row.id);
            if (cell) cell.value = row.content;
        });
    }
}

        loadData();
    </script>

async function startApp() {

function applyCellColor(element, text) {
    if (!element) return;

    const val = (text || "").toLowerCase().trim();
    
    // 1. Reset all classes
    element.classList.remove('bg-green', 'bg-yellow', 'bg-blue', 'bg-red', 'bg-grey', 'bg-filled');

    // 2. If empty, stop here
    if (val === "") return;

    // 3. Status Keyword Checks (Now including 'fail')
    
    // RED: Urgent / Negative
    if (val.includes('fail') || val.includes('block') || val.includes('stop') || val.includes('urgent')) {
        element.classList.add('bg-red');
    } 
    // GREEN: Success
    else if (val.includes('level 4') || val.includes('complete') || val.includes('yes') || val.includes('pass')) {
        element.classList.add('bg-green');
    } 
    // YELLOW: Warning
    else if (val.includes('level 2') || val.includes('hold') || val.includes('pending')) {
        element.classList.add('bg-yellow');
    } 
    // BLUE: Active
    else if (val.includes('progress') || val.includes('level 3') || val.includes('run')) {
        element.classList.add('bg-blue');
    } 
    // GREY: Neutral
    else if (val.includes('n/a') || val.includes('cancel')) {
        element.classList.add('bg-grey');
    }
    // 4. LIGHT BLUE: Fallback for any other information
    else {
        element.classList.add('bg-filled');
    }
}

// Helper to create stable, short integers for Supabase int4
function generateNumericId(dayLabel, index) {
    const dayMap = { 
        "Monday": 1, "Tuesday": 2, "Wednesday": 3, "Thursday": 4, 
        "Friday": 5, "Saturday": 6, "Sunday": 7 
    };
    // Format: DayDigit + RowIndex (e.g., Monday Row 5 = 105)
    return (dayMap[dayLabel] || 0) * 100 + index;
}

function addRowsToContainer(container, dayLabel, count, anchorBtn = null) {
    for (let r = 0; r < count; r++) {
        // --- CHANGE: Use stable numeric ID instead of Date.now() ---
        const rowNumericId = generateNumericId(dayLabel, r);
        
        const rowDiv = document.createElement('div');
        rowDiv.className = 'cell-row';
        rowDiv.id = `row-wrapper-${rowNumericId}`;

        for (let col = 1; col <= 8; col++) {
            const cellId = `${dayLabel}-r${rowNumericId}-c${col}`;
            let element;

            if ([1, 2, 3, 4, 6, 7].includes(col)) {
                element = document.createElement('select');
                element.id = cellId;
                
                const defaultOpt = document.createElement('option');
                defaultOpt.value = "";
                defaultOpt.text = (col === 6) ? "+ Add Multi" : "Select...";
                element.appendChild(defaultOpt);

                const options = dropdownData[`col${col}`] || [];
                options.forEach(text => {
                    const opt = document.createElement('option');
                    opt.value = text;
                    opt.text = text;
                    element.appendChild(opt);
                });

                element.onchange = () => {
                    applyCellColor(element, element.value);
                    if (col === 6) {
                        updateMultiValue(rowNumericId, dayLabel, element.value);
                    } else {
                        saveRow(rowNumericId, dayLabel);
                    }
                };
            } else {
                element = document.createElement('input');
                element.id = cellId;
                element.placeholder = "...";
                element.onblur = () => {
                    applyCellColor(element, element.value);
                    saveRow(rowNumericId, dayLabel);
                };
            }
            rowDiv.appendChild(element);
        }
        
        if (anchorBtn) {
            container.insertBefore(rowDiv, anchorBtn);
        } else {
            container.appendChild(rowDiv);
        }
    }
}

const contentArea = document.getElementById('main-content-area');

function createSections() {
    const contentArea = document.getElementById('main-content-area');
    if (!contentArea) return;
    
    contentArea.innerHTML = ''; 
    const baseDate = new Date(START_DATE + "T00:00:00");

    for (let w = 0; w < WEEKS_TO_SHOW; w++) {
        // --- 1. BUILD WEEK CONTAINER ---
        const weekDiv = document.createElement('div');
        weekDiv.className = 'week-container';

        const weekStart = new Date(baseDate);
        weekStart.setDate(baseDate.getDate() + (w * 7));
        const weekEnd = new Date(weekStart);
        weekEnd.setDate(weekStart.getDate() + 6);

        const weekHeader = document.createElement('div');
        weekHeader.className = 'week-header';
        weekHeader.innerHTML = `
            <span>Week of ${weekStart.toLocaleDateString([], {month:'short', day:'numeric'})} - ${weekEnd.toLocaleDateString([], {month:'short', day:'numeric'})}</span>
            <span class="week-arrow">▼</span>
        `;

        const weekContent = document.createElement('div');
        weekContent.className = 'week-content';

        // Week Toggle
        weekHeader.onclick = () => {
            const isHidden = weekContent.classList.toggle('hidden');
            weekHeader.querySelector('.week-arrow').innerText = isHidden ? '▶' : '▼';
        };

        // --- 2. BUILD DAYS INSIDE WEEK ---
        for (let d = 0; d < 7; d++) {
            const sectionDate = new Date(weekStart);
            sectionDate.setDate(weekStart.getDate() + d);
            const dateId = sectionDate.toISOString().split('T')[0];
            const dateString = sectionDate.toLocaleDateString('en-US', { weekday: 'long', month: 'long', day: 'numeric' });

            const section = document.createElement('div');
            section.className = 'section-container';

            const header = document.createElement('div');
            header.className = 'date-header';
            header.innerHTML = `<span>${dateString}</span> <span class="arrow">▼</span>`;
            
            const rowsDiv = document.createElement('div');
            rowsDiv.className = 'rows-container';
            rowsDiv.id = `rows-${dateId}`;

            // Day Toggle (Crucial: stopPropagation prevents week-header from firing)
            header.onclick = (e) => {
                e.stopPropagation();
                const isHidden = rowsDiv.classList.toggle('hidden');
                header.querySelector('.arrow').innerText = isHidden ? '▶' : '▼';
            };

            // Reuse your existing addRows function
            addRowsToContainer(rowsDiv, dateId, INITIAL_ROWS);

            const addBtn = document.createElement('button');
            addBtn.className = 'add-rows-btn';
            addBtn.innerText = "+ Add 5 Rows";
            addBtn.onclick = (e) => {
                e.stopPropagation(); // Keep week from collapsing when adding rows
                addRowsToContainer(rowsDiv, dateId, 5, addBtn);
            };

            rowsDiv.appendChild(addBtn);
            section.appendChild(header);
            section.appendChild(rowsDiv);
            weekContent.appendChild(section);
        }

        weekDiv.appendChild(weekHeader);
        weekDiv.appendChild(weekContent);
        contentArea.appendChild(weekDiv);
    }
    loadData(); // Final sync with Supabase
}


let allWeeksCollapsed = false; // Track the global state

function toggleAllSections() {
    const weekContents = document.querySelectorAll('.week-content');
    const weekArrows = document.querySelectorAll('.week-arrow');
    const btn = document.getElementById('collapse-all-btn');
    
    // Toggle the state
    allWeeksCollapsed = !allWeeksCollapsed;

    weekContents.forEach((content, index) => {
        if (allWeeksCollapsed) {
            // Force collapse
            content.classList.add('hidden');
            if (weekArrows[index]) weekArrows[index].innerText = '▶';
        } else {
            // Force expand
            content.classList.remove('hidden');
            if (weekArrows[index]) weekArrows[index].innerText = '▼';
        }
    });

    // Update the button text to show the next action
    btn.innerText = allWeeksCollapsed ? "Expand All Weeks" : "Collapse All Weeks";
}

async function updateMultiValue(rowNum, dayLabel, newValue) {

    // Fetch existing data for this row
    const { data } = await _supabase
        .from('BackEndData')

        .eq('id', rowNum)
        .single();

    let currentContent = (data && data.col6) ? data.col6 : "";
    let items = currentContent ? currentContent.split(', ') : [];

    const index = items.indexOf(newValue);
    if (index === -1) {
        if (newValue !== "") items.push(newValue);
    } else {
        items.splice(index, 1);
    }

    const updatedString = items.join(', ');
    applyCellColor(element, updatedString);
    element.title = "Selected: " + updatedString;
    
    // Pass the number and the label to saveRow
    await saveRow(rowNum, dayLabel, updatedString);
    element.value = ""; 
}

async function deleteFullRow(wrapperId, cellIds) {
    if (confirm("Delete this entire line?")) {
        // 1. Remove from Screen
        document.getElementById(wrapperId).remove();

        // 2. Remove from Supabase
        const { error } = await _supabase
            .from('cells')
            .delete()
            .in('id', cellIds);

        if (error) console.error("Delete error:", error.message);
    }
}

async function saveRow(rowNum, dayLabel, col6Override = null) {
    const status = document.getElementById('saveIndicator');
    if(status) status.innerText = "Syncing...";

    // Convert to a clean integer
    const cleanId = parseInt(rowNum);
    if (isNaN(cleanId)) {
        console.error("🔴 Fatal Error: rowNum is not a number!", rowNum);
        if(status) status.innerText = "Error: Invalid ID";
        return;
    }

    const rowData = {
        id: cleanId,
        day_label: dayLabel,
        col1: document.getElementById(`${dayLabel}-r${cleanId}-c1`)?.value || "",
        col2: document.getElementById(`${dayLabel}-r${cleanId}-c2`)?.value || "",
        col3: document.getElementById(`${dayLabel}-r${cleanId}-c3`)?.value || "",
        col4: document.getElementById(`${dayLabel}-r${cleanId}-c4`)?.value || "",
        col5: document.getElementById(`${dayLabel}-r${cleanId}-c5`)?.value || "",
        col6: col6Override !== null ? col6Override : (document.getElementById(`${dayLabel}-r${cleanId}-c6`)?.value || ""),
        col7: document.getElementById(`${dayLabel}-r${cleanId}-c7`)?.value || "",
        col8: document.getElementById(`${dayLabel}-r${cleanId}-c8`)?.value || ""
    };

    const { error } = await _supabase
        .from('BackEndData')
        .upsert(rowData, { onConflict: 'id' });

    if (error) {
        if(status) status.innerText = "Error: " + error.message;
    } else {
        if(status) status.innerText = "Saved";
        setTimeout(() => { if(status.innerText === "Saved") status.innerText = ""; }, 2000);
    }
}

    document.querySelectorAll('.week-content').forEach((content, i) => {

input.onblur = () => {

    applyCellColor(input, input.value);

    // 2. Extract rowNum and dayLabel from the ID string
    // Format is "DayLabel-r101-c5"

// UPDATE YOUR LOAD LOGIC
async function loadData() {
    console.log("Loading rows from Supabase...");
    const { data, error } = await _supabase
        .from('BackEndData')
        .select('*');

    if (error) {
        console.error("Load error:", error);
        return;
    }

    if (data) {
        data.forEach(row => {
            for (let col = 1; col <= 8; col++) {
                const cellId = `${row.day_label}-r${row.id}-c${col}`;
                const el = document.getElementById(cellId);
                if (el) {
                    const content = row[`col${col}`] || "";
                    el.value = content;
                    applyCellColor(el, content);
                }
            }
        });
    }
}
